<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Files</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('bg.png') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    min-height: 100vh;
    background: rgba(0,0,0,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 360px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 25px;
    color: white;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
}

button {
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

#dashboard { display: none; }

.file-item {
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.2);
    padding: 8px;
    border-radius: 8px;
    margin-top: 6px;
}
</style>
</head>

<body>
<div class="overlay">

<div class="card" id="loginBox">
    <h2>Вход / Регистрация</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Парола">
    <button onclick="register()">Регистрация</button>
    <button onclick="login()">Вход</button>
</div>

<div class="card" id="dashboard">
    <h2>Файлове</h2>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Качи</button>
    <button onclick="logout()">Изход</button>

    <progress id="progressBar" value="0" max="100" style="width:100%; margin-top:10px;"></progress>

    <div id="fileList"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword, 
    signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
    getStorage, 
    ref, 
    uploadBytesResumable, 
    getDownloadURL, 
    listAll, 
    deleteObject 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
 // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAHp3KrUraJWJ-WlUtb1lAaQNllb5vixfs",
  authDomain: "cloud-files-55f1f.firebaseapp.com",
  projectId: "cloud-files-55f1f",
  storageBucket: "cloud-files-55f1f.firebasestorage.app",
  messagingSenderId: "169443354765",
  appId: "1:169443354765:web:7989441810b544f8825ac4",
  measurementId: "G-VS74E6Z947"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);, // 🔴 СМЕНИ ТОВА
  authDomain: "cloud-files-55f1f.firebaseapp.com",
  projectId: "cloud-files-55f1f",
  storageBucket: "cloud-files-55f1f.appspot.com",
  messagingSenderId: "169443354765",
  appId: "1:169443354765:web:7989441810b544f8825ac4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const storage = getStorage(app);

let user = null;

const email = document.getElementById("email");
const password = document.getElementById("password");
const fileInput = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");
const progressBar = document.getElementById("progressBar");

// REGISTER
window.register = async function () {
    try {
        await createUserWithEmailAndPassword(auth, email.value, password.value);
        alert("Регистриран!");
    } catch (err) {
        alert(err.message);
    }
}

// LOGIN
window.login = async function () {
    try {
        const cred = await signInWithEmailAndPassword(auth, email.value, password.value);
        user = cred.user;

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        loadFiles();
    } catch (err) {
        alert(err.message);
    }
}

// LOGOUT
window.logout = async function () {
    await signOut(auth);
    user = null;

    document.getElementById("loginBox").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
}

// UPLOAD
window.uploadFile = function () {
    if (!user) return alert("Трябва да сте влезли!");

    const file = fileInput.files[0];
    if (!file) return alert("Изберете файл!");

    const storageRef = ref(storage, `${user.uid}/${file.name}`);
    const uploadTask = uploadBytesResumable(storageRef, file);

    uploadTask.on('state_changed',
        (snapshot) => {
            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            progressBar.value = progress;
        },
        (error) => {
            alert(error.message);
        },
        () => {
            progressBar.value = 0;
            loadFiles();
        }
    );
}

// LOAD FILES
async function loadFiles() {
    fileList.innerHTML = "";

    const listRef = ref(storage, user.uid);
    const result = await listAll(listRef);

    for (const item of result.items) {
        const url = await getDownloadURL(item);

        const div = document.createElement("div");
        div.className = "file-item";

        const name = document.createElement("span");
        name.textContent = item.name;

        const link = document.createElement("a");
        link.href = url;
        link.textContent = "Изтегли";
        link.target = "_blank";

        const delBtn = document.createElement("button");
        delBtn.textContent = "🗑️";
        delBtn.style.width = "50px";

        delBtn.onclick = async () => {
            if (confirm("Сигурен ли си?")) {
                await deleteObject(item);
                loadFiles();
            }
        };

        div.appendChild(name);
        div.appendChild(link);
        div.appendChild(delBtn);

        fileList.appendChild(div);
    }
}
</script>

</body>
</html>
